<div class="px-4 pb-8 max-w-7xl mx-auto mt-4 relative">
    <!-- Floating Toast Notification (Mobile Optimized) -->
    <div *ngIf="showToast"
        class="fixed bottom-8 left-1/2 -translate-x-1/2 z-[100] bg-zomato-red text-white px-6 py-3 rounded-full font-black uppercase tracking-widest shadow-xl flex items-center gap-3 animate-in fade-in slide-in-from-bottom-4 duration-300">
        <span class="text-lg">✅</span>
        <span class="text-xs sm:text-sm whitespace-nowrap">{{ toastMessage }}</span>
    </div>

    <!-- Success/Error Messages (Existing) -->
    <div *ngIf="successMessage"
        class="mb-4 p-4 bg-white/10 text-white font-black uppercase tracking-widest rounded-2xl shadow-sm animate-bounce text-center border-2 border-white">
        {{ successMessage }}
    </div>
    <div *ngIf="errorMessage"
        class="mb-4 p-4 bg-white text-zomato-red font-black uppercase tracking-widest rounded-2xl shadow-lg text-center">
        {{ errorMessage }}
    </div>

    <div class="flex flex-col lg:flex-row gap-6">
        <!-- Item Selection -->
        <div class="flex-grow">
            <div class="bg-zomato-red rounded-3xl overflow-hidden shadow-2xl border border-white/20">
                <div class="bg-white/10 px-6 py-6 border-b border-white/20">
                    <h2 class="text-xl sm:text-2xl font-black text-white tracking-tighter uppercase">Select Items</h2>
                    <p class="text-[10px] sm:text-xs font-bold text-white/60 uppercase tracking-widest mt-1">Tap an item
                        to add it to the order</p>
                </div>

                <div class="p-4 sm:p-6 lg:p-10">
                    <!-- Loading Skeletons -->
                    <div *ngIf="isLoadingItems" class="grid grid-cols-2 sm:grid-cols-3 lg:grid-cols-4 gap-4 sm:gap-6">
                        <div *ngFor="let i of [1,2,3,4,5,6,7,8]"
                            class="bg-white/5 animate-pulse h-28 sm:h-36 rounded-[2rem] border border-white/10 flex flex-col items-center justify-center gap-3">
                            <div class="w-12 h-12 bg-white/10 rounded-2xl"></div>
                            <div class="h-3 bg-white/10 rounded-full w-2/3"></div>
                        </div>
                    </div>

                    <!-- Items Grid -->
                    <div class="grid grid-cols-2 sm:grid-cols-3 lg:grid-cols-4 gap-4 sm:gap-6">
                        <button *ngFor="let item of items" (click)="addToCart(item)"
                            class="group relative bg-white/5 hover:bg-white hover:scale-105 border-2 border-white/10 hover:border-white p-4 sm:p-6 rounded-2xl transition-all duration-300 transform active:scale-95 shadow-lg flex flex-col items-center justify-center gap-3">
                            <div class="text-3xl sm:text-4xl transition-transform group-hover:scale-110">
                                <span>🍽️</span>
                            </div>
                            <span
                                class="text-xs sm:text-sm font-black text-white group-hover:text-zomato-red uppercase tracking-tighter text-center">{{item.name}}</span>
                            <div class="absolute top-2 right-2 opacity-0 group-hover:opacity-100 transition-opacity">
                                <span
                                    class="bg-white text-zomato-red text-[10px] font-bold px-2 py-0.5 rounded-full">+</span>
                            </div>
                        </button>
                    </div>

                </div>
            </div>
        </div>

        <!-- Order Summary & Actions Panel -->
        <div class="w-full lg:w-96 flex flex-col gap-6">
            <!-- Cart Preview -->
            <div
                class="bg-zomato-red rounded-3xl overflow-hidden shadow-2xl border border-white/20 flex flex-col h-fit lg:max-h-[80vh]">
                <div class="bg-white/10 px-6 py-5 flex justify-between items-center border-b border-white/20">
                    <h2 class="text-lg font-black text-white tracking-tighter uppercase">Current Order</h2>
                    <button *ngIf="cart.length > 0" (click)="clearCart()"
                        class="text-[10px] font-black text-white hover:underline uppercase tracking-widest transition-colors flex items-center gap-1">
                        <span>Clear</span> 🅇
                    </button>
                </div>

                <div class="flex-grow overflow-y-auto p-4 sm:p-6 min-h-[200px] max-h-[400px] lg:max-h-none">
                    <div *ngIf="cart.length === 0" class="h-full flex flex-col items-center justify-center py-10">
                        <span class="text-5xl mb-3 opacity-80">🛒</span>
                        <p class="text-[10px] font-black uppercase tracking-widest text-white">Cart is empty</p>
                    </div>

                    <div class="space-y-3">
                        <div *ngFor="let entry of cart"
                            class="group bg-white/5 border border-white/10 p-3 sm:p-4 rounded-2xl flex items-center justify-between hover:border-white transition-all shadow-sm">
                            <div class="flex flex-col">
                                <span
                                    class="text-xs sm:text-sm font-black text-white uppercase tracking-tighter">{{entry.item.name}}</span>
                            </div>
                            <div class="flex items-center gap-3">
                                <button (click)="decreaseQuantity(entry.item.id)"
                                    class="w-8 h-8 rounded-lg border border-white/20 text-white hover:bg-white/10 transition-all font-black text-lg">-</button>
                                <span class="text-sm font-black text-white w-4 text-center">{{entry.quantity}}</span>
                                <button (click)="increaseQuantity(entry.item.id)"
                                    class="w-8 h-8 rounded-lg border border-white/20 text-white hover:bg-white/10 transition-all font-black text-lg">+</button>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Transaction Details (Order Type, Payment Mode, Manual Amount) -->
                <div class="p-4 sm:p-6 bg-white/5 border-t border-white/20 space-y-6">
                    <div class="space-y-4">
                        <!-- Order Type -->
                        <div>
                            <p class="text-[10px] font-black text-white/60 uppercase tracking-widest mb-2 px-1">Order
                                Type</p>
                            <div class="grid grid-cols-2 gap-2">
                                <button (click)="orderType = 'Dine-in'"
                                    [ngClass]="orderType === 'Dine-in' ? 'bg-white text-zomato-red shadow-lg' : 'bg-white/10 text-white border border-white/20'"
                                    class="py-3 rounded-xl text-xs font-black uppercase tracking-tighter transition-all">Dine-in</button>
                                <button (click)="orderType = 'Takeaway'"
                                    [ngClass]="orderType === 'Takeaway' ? 'bg-white text-zomato-red shadow-lg' : 'bg-white/10 text-white border border-white/20'"
                                    class="py-3 rounded-xl text-xs font-black uppercase tracking-tighter transition-all">Takeaway</button>
                            </div>
                        </div>

                        <!-- Payment Mode -->
                        <div>
                            <p class="text-[10px] font-black text-white/60 uppercase tracking-widest mb-2 px-1">Payment
                                Mode</p>
                            <div class="grid grid-cols-2 gap-2">
                                <button (click)="paymentMode = 'Cash'"
                                    [ngClass]="paymentMode === 'Cash' ? 'bg-white text-zomato-red shadow-lg' : 'bg-white/10 text-white border border-white/20'"
                                    class="py-3 rounded-xl text-xs font-black uppercase tracking-tighter transition-all">Cash</button>
                                <button (click)="paymentMode = 'UPI'"
                                    [ngClass]="paymentMode === 'UPI' ? 'bg-white text-zomato-red shadow-lg' : 'bg-white/10 text-white border border-white/20'"
                                    class="py-3 rounded-xl text-xs font-black uppercase tracking-tighter transition-all">UPI</button>
                            </div>
                        </div>

                        <!-- Manual Amount Entry -->
                        <div>
                            <p class="text-[10px] font-black text-white/60 uppercase tracking-widest mb-2 px-1">Total
                                Amount Charged (₹)</p>
                            <input type="number" [(ngModel)]="manualAmount"
                                class="w-full bg-white/10 border-2 border-white/20 rounded-2xl px-5 py-4 text-white text-xl font-black focus:border-white transition-all outline-none placeholder-white/20 text-center"
                                placeholder="Enter Amount">
                        </div>
                    </div>

                    <button (click)="onSubmit()" [disabled]="cart.length === 0 || !manualAmount || isSubmitting"
                        class="w-full bg-white text-zomato-red py-5 rounded-2xl font-black uppercase tracking-[0.2em] hover:bg-white/90 active:scale-95 transition-all shadow-2xl disabled:opacity-30 disabled:grayscale disabled:cursor-not-allowed group flex items-center justify-center gap-3">
                        <div *ngIf="isSubmitting" class="spinner border-zomato-red/30 border-t-zomato-red"></div>
                        <span class="group-hover:translate-x-1 transition-transform">{{ isSubmitting ? 'Recording...' :
                            'Complete Order' }}</span>
                    </button>
                </div>
            </div>
        </div>
    </div>
</div>
