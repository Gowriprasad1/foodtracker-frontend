<div class="min-h-[calc(100vh-80px)] bg-swiggy-light flex items-center justify-center p-0 sm:p-8">
    <div
        class="w-full sm:max-w-4xl h-screen sm:h-[85vh] bg-white sm:rounded-2xl shadow-swiggy flex flex-col overflow-hidden border border-swiggy-border transition-all duration-300">

        <div
            class="bg-white p-4 sm:p-5 flex items-center justify-between text-swiggy-text border-b border-swiggy-border shadow-sm z-10 relative">

            <div class="flex items-center space-x-4 sm:space-x-5 relative z-10">
                <div
                    class="w-12 h-12 sm:w-14 sm:h-14 bg-white overflow-hidden rounded-xl sm:rounded-2xl flex items-center justify-center shadow-sm border border-swiggy-border relative group robot-animated">
                    <img [src]="robotAsset" alt="AI Assistant" class="w-full h-full object-cover transform scale-110">
                </div>
                <div>
                    <h1 class="font-black text-xl sm:text-2xl tracking-tight leading-none text-swiggy-text">
                        Sales AI Hub</h1>
                    <p
                        class="text-swiggy-gray text-[10px] sm:text-xs mt-1.5 flex items-center font-bold tracking-widest uppercase">
                        <span class="relative flex h-2 w-2 mr-2">
                            <span
                                class="animate-ping absolute inline-flex h-full w-full rounded-full bg-green-500 opacity-75"></span>
                            <span class="relative inline-flex rounded-full h-2 w-2 bg-green-500"></span>
                        </span>
                        Neural Analysis Active
                    </p>
                </div>
            </div>

            <div class="hidden md:flex flex-col items-end">
                <div class="bg-swiggy-light px-3 py-1.5 rounded-lg border border-swiggy-border flex items-center gap-2">
                    <div class="w-2 h-2 rounded-full bg-swiggy-orange animate-pulse"></div>
                    <span class="text-swiggy-dark font-bold text-xs uppercase tracking-wider">Active</span>
                </div>
            </div>
        </div>

        <!-- Messages Area -->
        <div class="flex-1 overflow-y-auto p-4 sm:p-8 space-y-6 bg-swiggy-light/30 hide-scrollbar" #messageContainer>
            <div *ngFor="let msg of messages"
                [ngClass]="{'flex justify-start': msg.isBot, 'flex justify-end': !msg.isBot}"
                class="animate-in fade-in slide-in-from-bottom-4 duration-300">

                <div [ngClass]="{
                  'bg-white text-swiggy-dark shadow-sm border border-swiggy-border rounded-2xl rounded-tl-sm': msg.isBot,
                  'bg-swiggy-orange text-white shadow-swiggy-orange rounded-2xl rounded-tr-sm': !msg.isBot,
                  'w-full max-w-[90%] sm:max-w-[75%]': true
                }" class="p-4 sm:p-5 text-sm sm:text-base leading-relaxed relative group">

                    <div *ngIf="msg.isAnalysis"
                        class="whitespace-pre-line font-medium border-l-[4px] border-swiggy-orange pl-4 py-1 text-swiggy-text">
                        {{ msg.text }}
                    </div>
                    <div *ngIf="!msg.isAnalysis" [ngClass]="{'font-medium': !msg.isBot}">
                        {{ msg.text }}
                    </div>

                    <!-- Options Grid -->
                    <div *ngIf="msg.options" class="mt-5 grid grid-cols-1 sm:grid-cols-2 gap-3">
                        <button *ngFor="let opt of msg.options"
                            (click)="msg.text.includes('WHAT WOULD YOU LIKE TO DO') ? handleNavOption(opt) : selectOption(opt)"
                            class="group/btn text-left p-4 rounded-xl border border-swiggy-border text-swiggy-dark hover:border-swiggy-orange hover:text-swiggy-orange transition-all text-sm font-bold bg-white shadow-sm active:scale-95 duration-200">
                            {{ opt }}
                        </button>
                    </div>
                </div>
            </div>

            <!-- Typing Indicator -->
            <div *ngIf="isTyping"
                class="flex flex-col items-center justify-center space-y-3 py-6 animate-in fade-in zoom-in duration-300">
                <div class="w-24 h-24 relative">
                    <img src="/assets/loading-robot.png" alt="Loading..."
                        class="w-full h-full object-contain filter drop-shadow-sm">
                </div>
                <div
                    class="flex items-center space-x-2 bg-white px-5 py-2.5 rounded-full shadow-sm border border-swiggy-border">
                    <span class="text-xs font-bold uppercase tracking-wider text-swiggy-gray">Fetching Data</span>
                    <div class="flex space-x-1">
                        <div class="w-1.5 h-1.5 bg-swiggy-orange rounded-full animate-bounce [animation-duration:0.8s]">
                        </div>
                        <div
                            class="w-1.5 h-1.5 bg-swiggy-orange rounded-full animate-bounce [animation-delay:0.2s] [animation-duration:0.8s]">
                        </div>
                        <div
                            class="w-1.5 h-1.5 bg-swiggy-orange rounded-full animate-bounce [animation-delay:0.4s] [animation-duration:0.8s]">
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Footer -->
        <div
            class="px-5 sm:px-8 py-4 bg-white border-t border-swiggy-border flex flex-col sm:flex-row sm:items-center justify-between space-y-2 sm:space-y-0 text-swiggy-muted">
            <div class="flex items-center space-x-2">
                <span class="text-sm">🔒</span>
                <span class="text-[10px] font-bold uppercase tracking-widest">End-to-End Encrypted</span>
            </div>
            <div class="flex space-x-4">
                <button
                    class="text-[10px] font-bold uppercase tracking-widest hover:text-swiggy-dark transition-colors">Help</button>
                <button
                    class="text-[10px] font-bold uppercase tracking-widest hover:text-swiggy-dark transition-colors">Privacy</button>
            </div>
        </div>
    </div>
</div>
