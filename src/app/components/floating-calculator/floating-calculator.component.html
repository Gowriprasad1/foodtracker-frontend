<!-- Floating FAB Button -->
<div class="fixed bottom-6 right-6 z-[200]">
    <button (click)="toggleCalculator($event)" (mousedown)="onDragStart($event)" (window:mousemove)="onDragMove($event)"
        (window:mouseup)="onDragEnd($event)" (touchstart)="onDragStart($event)" (window:touchmove)="onDragMove($event)"
        (window:touchend)="onDragEnd($event)"
        [style.transform]="'translate3d(' + position.x + 'px, ' + position.y + 'px, 0)'"
        [ngClass]="isOpen || isDragging ? 'opacity-100' : 'opacity-40'"
        class="bg-white hover:opacity-100 text-swiggy-orange w-14 h-14 flex items-center justify-center rounded-full shadow-[0_8px_30px_rgb(0,0,0,0.25)] border-2 border-transparent hover:border-gray-100 hover:scale-105 active:scale-95 transition-all outline-none cursor-move select-none touch-none">
        <span class="text-2xl pointer-events-none">🧮</span>
    </button>
</div>

<!-- Calculator Modal Overlay -->
<div (click)="toggleCalculator()" [class.opacity-0]="!isOpen" [class.pointer-events-none]="!isOpen"
    [class.opacity-100]="isOpen"
    class="fixed inset-0 bg-swiggy-dark/40 backdrop-blur-sm z-[210] flex items-center justify-center p-4 transition-all duration-200 ease-out">

    <!-- Calculator Container -->
    <div (click)="$event.stopPropagation()" [class.scale-95]="!isOpen" [class.translate-y-4]="!isOpen"
        [class.opacity-0]="!isOpen" [class.scale-100]="isOpen" [class.translate-y-0]="isOpen"
        [class.opacity-100]="isOpen"
        class="bg-white border border-swiggy-border w-full max-w-xs rounded-2xl overflow-hidden shadow-swiggy-lg transition-all duration-200 ease-out">

        <!-- Display -->
        <div class="bg-swiggy-light/50 px-6 py-8 text-right border-b border-swiggy-border">
            <div class="text-swiggy-gray text-xs font-bold uppercase tracking-wider mb-2">Calculator</div>
            <div class="text-swiggy-dark text-4xl font-black tracking-tight truncate">{{ display }}</div>
        </div>

        <!-- Keypad -->
        <div class="p-4 grid grid-cols-4 gap-2 bg-white">
            <!-- AC -->
            <button (click)="resetCalculator()"
                class="col-span-3 bg-swiggy-light hover:bg-gray-200 text-swiggy-dark p-4 rounded-xl font-bold transition-all active:scale-95 text-base border border-swiggy-border">AC</button>
            <button (click)="handleOperator('/')"
                class="bg-swiggy-orange/10 hover:bg-swiggy-orange/20 text-swiggy-orange border border-swiggy-orange/30 p-4 rounded-xl font-black transition-all active:scale-95 text-xl">÷</button>

            <!-- Row 1 -->
            <button (click)="inputDigit('7')"
                class="bg-white hover:bg-swiggy-light border border-swiggy-border text-swiggy-dark p-4 rounded-xl font-bold transition-all active:scale-95 text-lg">7</button>
            <button (click)="inputDigit('8')"
                class="bg-white hover:bg-swiggy-light border border-swiggy-border text-swiggy-dark p-4 rounded-xl font-bold transition-all active:scale-95 text-lg">8</button>
            <button (click)="inputDigit('9')"
                class="bg-white hover:bg-swiggy-light border border-swiggy-border text-swiggy-dark p-4 rounded-xl font-bold transition-all active:scale-95 text-lg">9</button>
            <button (click)="handleOperator('*')"
                class="bg-swiggy-orange/10 hover:bg-swiggy-orange/20 text-swiggy-orange border border-swiggy-orange/30 p-4 rounded-xl font-black transition-all active:scale-95 text-xl">×</button>

            <!-- Row 2 -->
            <button (click)="inputDigit('4')"
                class="bg-white hover:bg-swiggy-light border border-swiggy-border text-swiggy-dark p-4 rounded-xl font-bold transition-all active:scale-95 text-lg">4</button>
            <button (click)="inputDigit('5')"
                class="bg-white hover:bg-swiggy-light border border-swiggy-border text-swiggy-dark p-4 rounded-xl font-bold transition-all active:scale-95 text-lg">5</button>
            <button (click)="inputDigit('6')"
                class="bg-white hover:bg-swiggy-light border border-swiggy-border text-swiggy-dark p-4 rounded-xl font-bold transition-all active:scale-95 text-lg">6</button>
            <button (click)="handleOperator('-')"
                class="bg-swiggy-orange/10 hover:bg-swiggy-orange/20 text-swiggy-orange border border-swiggy-orange/30 p-4 rounded-xl font-black transition-all active:scale-95 text-xl">-</button>

            <!-- Row 3 -->
            <button (click)="inputDigit('1')"
                class="bg-white hover:bg-swiggy-light border border-swiggy-border text-swiggy-dark p-4 rounded-xl font-bold transition-all active:scale-95 text-lg">1</button>
            <button (click)="inputDigit('2')"
                class="bg-white hover:bg-swiggy-light border border-swiggy-border text-swiggy-dark p-4 rounded-xl font-bold transition-all active:scale-95 text-lg">2</button>
            <button (click)="inputDigit('3')"
                class="bg-white hover:bg-swiggy-light border border-swiggy-border text-swiggy-dark p-4 rounded-xl font-bold transition-all active:scale-95 text-lg">3</button>
            <button (click)="handleOperator('+')"
                class="bg-swiggy-orange/10 hover:bg-swiggy-orange/20 text-swiggy-orange border border-swiggy-orange/30 p-4 rounded-xl font-black transition-all active:scale-95 text-xl">+</button>

            <!-- Row 4 -->
            <button (click)="inputDigit('0')"
                class="col-span-2 bg-white hover:bg-swiggy-light border border-swiggy-border text-swiggy-dark p-4 rounded-xl font-bold transition-all active:scale-95 text-lg">0</button>
            <button (click)="inputDecimal()"
                class="bg-white hover:bg-swiggy-light border border-swiggy-border text-swiggy-dark p-4 rounded-xl font-bold transition-all active:scale-95 text-lg">.</button>
            <button (click)="handleEquals()"
                class="bg-swiggy-orange hover:bg-[#e47214] text-white p-4 rounded-xl font-black transition-all active:scale-95 text-xl shadow-swiggy-orange border border-swiggy-orange">=</button>
        </div>

        <!-- Close Button -->
        <div class="px-4 pb-4 bg-white">
            <button (click)="toggleCalculator()"
                class="w-full bg-white hover:bg-swiggy-light text-swiggy-dark py-3 rounded-xl font-bold text-sm tracking-wide transition-all border border-swiggy-border shadow-sm">Close</button>
        </div>
    </div>
</div>
