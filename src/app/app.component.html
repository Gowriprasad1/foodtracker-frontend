<div
  class="min-h-screen bg-zomato-red text-white font-sans selection:bg-white selection:text-zomato-red overflow-x-hidden">
  <!-- Navigation Header -->
  <nav class="bg-zomato-red text-white border-b border-white/20 shadow-lg sticky top-0 z-50">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
      <div class="flex items-center justify-between h-16">
        <div class="flex items-center">
          <span class="font-black text-lg sm:text-xl tracking-tighter cursor-pointer flex items-center text-white"
            routerLink="/" (click)="isMenuOpen = false">
            <span class="mr-2">🍽️</span> <span class="hidden sm:inline">TIFFINTRACKER POS</span><span
              class="sm:hidden">TT POS</span>
          </span>
          <div class="hidden md:block">
            <div class="ml-10 flex items-baseline space-x-6">
              <a routerLink="/" routerLinkActive="bg-white text-zomato-red shadow-lg"
                [routerLinkActiveOptions]="{exact: true}"
                class="px-4 py-2 rounded-lg text-sm font-bold uppercase tracking-widest transition-all hover:bg-white/10 text-white">Data
                Entry</a>
              <a routerLink="/analytics" routerLinkActive="bg-white text-zomato-red shadow-lg"
                class="px-4 py-2 rounded-lg text-sm font-bold uppercase tracking-widest transition-all hover:bg-white/10 text-white">Analytics
                Dashboard</a>
              <a routerLink="/menu" routerLinkActive="bg-white text-zomato-red shadow-lg"
                class="px-4 py-2 rounded-lg text-sm font-bold uppercase tracking-widest transition-all hover:bg-white/10 text-white">Manage
                Menu</a>
              <a routerLink="/prediction" routerLinkActive="bg-white text-zomato-red shadow-lg"
                class="px-4 py-2 rounded-lg text-sm font-bold uppercase tracking-widest transition-all hover:bg-white/10 text-white font-black">Prediction
                AI Hub</a>
            </div>
          </div>
        </div>

        <!-- Mobile Hamburger Button -->
        <div class="md:hidden">
          <button (click)="toggleMenu()"
            class="p-2 rounded-lg text-white/70 hover:text-white hover:bg-white/10 transition-all focus:outline-none">
            <svg class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
              <path *ngIf="!isMenuOpen" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                d="M4 6h16M4 12h16M4 18h16" />
              <path *ngIf="isMenuOpen" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                d="M6 18L18 6M6 6l12 12" />
            </svg>
          </button>
        </div>
      </div>
    </div>

    <!-- Mobile Navigation Drawer -->
    <div *ngIf="isMenuOpen"
      class="md:hidden bg-zomato-red border-b border-white/20 absolute w-full z-40 animate-in slide-in-from-top duration-200">
      <div class="px-2 pt-2 pb-3 space-y-1 sm:px-3 shadow-2xl">
        <a routerLink="/" routerLinkActive="bg-white text-zomato-red" [routerLinkActiveOptions]="{exact: true}"
          (click)="isMenuOpen = false"
          class="block px-4 py-3 rounded-lg text-base font-bold uppercase tracking-widest transition-all text-white">Data
          Entry</a>
        <a routerLink="/analytics" routerLinkActive="bg-white text-zomato-red" (click)="isMenuOpen = false"
          class="block px-4 py-3 rounded-lg text-base font-bold uppercase tracking-widest transition-all text-white">Analytics
          Dashboard</a>
        <a routerLink="/menu" routerLinkActive="bg-white text-zomato-red" (click)="isMenuOpen = false"
          class="block px-4 py-3 rounded-lg text-base font-bold uppercase tracking-widest transition-all text-white">Manage
          Menu</a>
        <a routerLink="/prediction" routerLinkActive="bg-white text-zomato-red" (click)="isMenuOpen = false"
          class="block px-4 py-3 rounded-lg text-base font-bold uppercase tracking-widest transition-all text-white font-black">Prediction
          AI Hub</a>
      </div>
    </div>
  </nav>

  <!-- Main Content Area -->
  <main class="w-full">
    <router-outlet></router-outlet>
  </main>

  <!-- Mobile Overlay for Navigation -->
  <div *ngIf="isMenuOpen" (click)="toggleMenu()" class="fixed inset-0 bg-black/60 z-30 md:hidden backdrop-blur-sm">
  </div>

  <!-- Global Floating Calculator -->
  <app-floating-calculator></app-floating-calculator>
</div>
